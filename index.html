<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قضية طالب ثانوي - استمارة تسجيل</title>
    
    <link rel="icon" type="image/png" href="logoform.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        :root {
            --primary-color: #f5c400; 
            --dark-color: #111111;
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --gray-light: #e5e7eb;
            --section-title-color: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        /* تثبيت طبقة الخلفية بشكل كامل ومستقل عن التمرير */
        .edu-background {
            position: fixed;
            top: -5%; 
            left: -5%;
            width: 110%;
            height: 110%;
            z-index: 1;
            pointer-events: none;
            background-image: url('download (6).jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.15s ease-out;
            will-change: transform;
        }

        /* طبقة التظليل الفاتحة لضمان الـ Contrast */
        .edu-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 244, 244, 0.78);
        }

        /* حاوية الكارت الرئيسي */
        .form-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            position: relative;
            z-index: 2; 
        }

        .brand-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo {
            width: 100%;
            max-width: 240px;
            height: auto;
        }

        .section-badge {
            display: inline-block;
            padding: 6px 16px;
            background-color: #fef3c7;
            color: #d97706;
            font-size: 13px;
            font-weight: 700;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-step {
            display: none;
            animation: slideIn 0.4s ease-out forwards;
        }

        .form-step.active {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f9fafb;
            text-align: right;
        }

        .input-field:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 4px 12px rgba(245, 196, 0, 0.15);
        }

        /* عداد الحروف لخانة textarea */
        .char-counter {
            text-align: left;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 5px;
            font-weight: 600;
            transition: color 0.3s;
        }
        .char-counter.valid { color: #10b981; }
        .char-counter.invalid { color: #ef4444; }

        /* التحكم بأزرار أسفل الصفحة (التالي على اليسار) */
        .btn-container {
            display: flex;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #f3f4f6;
        }
        
        /* جعل زر التالي يذهب لليسار دائماً وزر السابق لليمين */
        .btn-container.single-btn {
            justify-content: flex-end;
        }
        
        .btn-container.split-btns {
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 12px 35px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-next {
            background-color: var(--dark-color);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-next:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-prev {
            background-color: #f3f4f6;
            color: #6b7280;
        }
        
        .btn-prev:hover {
            background-color: #e5e7eb;
        }

        .success-message {
            padding: 20px 0;
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            color: #10b981;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="edu-background" id="bgPattern"></div>

    <div class="form-container">
        <div class="brand-header">
            <img src="logoform.png" alt="قضية طالب ثانوي" class="brand-logo">
        </div>

        <form id="studentForm" onsubmit="event.preventDefault();">
            
            <div class="form-step active" data-step="1">
                <div style="text-align: center;">
                    <div class="section-badge">الجزء الأول: بيانات الطالب المتكاملة</div>
                </div>

                <div class="form-group">
                    <label for="fullName">الاسم بالكامل:</label>
                    <input type="text" id="fullName" class="input-field" placeholder="اكتب اسمك الثلاثي أو الرباعي هنا" oninput="updateDynamicNames()" required>
                </div>

                <div class="form-group">
                    <label for="city">المحافظة:</label>
                    <input type="text" id="city" class="input-field" placeholder="مثلاً: الإسكندرية، القاهرة..." required>
                </div>

                <div class="form-group">
                    <label for="phone">رقم تليفونك (واتساب) للتواصل:</label>
                    <input type="tel" id="phone" class="input-field" placeholder="01xxxxxxxxx" pattern="01[0125][0-9]{8}" title="يرجى إدخال رقم هاتف مصري صحيح مكون من 11 رقم" required>
                </div>

                <div class="form-group">
                    <label for="birthDate">تاريخ الميلاد:</label>
                    <input type="date" id="birthDate" class="input-field" required>
                </div>

                <div class="form-group">
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" id="email" class="input-field" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="grade">المرحلة الدراسية الحالية:</label>
                    <select id="grade" class="input-field" onchange="handleGradeChange()" required>
                        <option value="">اختر السنة الدراسية</option>
                        <option value="1">الصف الأول الثانوي</option>
                        <option value="2">الصف الثاني الثانوي</option>
                        <option value="3">الصف الثالث الثانوي</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="educationType">نوع النظام التعليمي:</label>
                    <select id="educationType" class="input-field" required>
                        <option value="">اختر نوع التعليم</option>
                        <option value="عام">ثانوي عام</option>
                        <option value="أزهر">ثانوي أزهري</option>
                    </select>
                </div>

                <div class="form-group" id="stepSection" style="display: none;">
                    <label for="section">الشعبة الدراسية:</label>
                    <select id="section" class="input-field">
                        <option value="">اختر الشعبة</option>
                    </select>
                </div>

                <div id="seniorThreeQuestions" style="display: none;">
                    <div class="form-group">
                        <label for="lessonSystem">نظام دروسك إيه؟</label>
                        <select id="lessonSystem" class="input-field">
                            <option value="">اختر نظام دروسك</option>
                            <option value="سنتر كلو">سنتر كلو</option>
                            <option value="اونلاين وسنتر">اونلاين وسنتر</option>
                            <option value="اونلاين فقط">اونلاين فقط</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="onlineLessonsCount">عدد الدروس الاونلاين الي بتاخده قد إيه؟</label>
                        <input type="text" id="onlineLessonsCount" class="input-field" placeholder="اكتب عدد الدروس أو تفاصيلها هنا">
                    </div>
                </div>

                <div class="btn-container single-btn">
                    <button type="button" class="btn-next" onclick="nextStep()">التالي</button>
                </div>
            </div>

            <div class="form-step" data-step="2">
                <div style="text-align: center;">
                    <div class="section-badge" style="background-color: #dbeafe; color: #1e40af;">الجزء الثاني: بيانات ولي الأمر</div>
                </div>

                <div class="form-group">
                    <label for="parentName">اسم ولي الأمر بالكامل:</label>
                    <input type="text" id="parentName" class="input-field" placeholder="اكتب اسم ولي الأمر هنا" required>
                </div>

                <div class="form-group">
                    <label for="parentPhone">رقم تليفون ولي الأمر للتواصل:</label>
                    <input type="tel" id="parentPhone" class="input-field" placeholder="01xxxxxxxxx" pattern="01[0125][0-9]{8}" title="يرجى إدخال رقم هاتف مصري صحيح مكون من 11 رقم" required>
                </div>

                <div class="form-group">
                    <label for="parentWhatsapp">هل رقم ولي الأمر السابق عليه (واتساب)؟</label>
                    <select id="parentWhatsapp" class="input-field" required>
                        <option value="">اختر الإجابة</option>
                        <option value="نعم، عليه واتساب">نعم، عليه واتساب</option>
                        <option value="لا، مكالمات فقط">لا، مكالمات فقط</option>
                    </select>
                </div>

                <div class="btn-container split-btns">
                    <button type="button" class="btn-prev" onclick="prevStep()">السابق</button>
                    <button type="button" class="btn-next" onclick="nextStep()">التالي</button>
                </div>
            </div>

            <div class="form-step" data-step="3">
                <div style="text-align: center;">
                    <div class="section-badge" style="background-color: #fce7f3; color: #9d174d;">الجزء الثالث: مشكلتك الدراسية</div>
                </div>

                <div class="form-group">
                    <label for="message">يا <span class="dynamic-name">بطل</span>، ما هي أكبر مشكلة تواجهك في الدراسة حالياً؟ (اختياري)</label>
                    <textarea id="message" class="input-field" style="height: 140px; resize: none;" placeholder="اكتب بالتفصيل لنتمكن من مساعدتك، أو يمكنك تخطي هذا السؤال لإرسال الاستمارة مباشرة..." oninput="checkMessageLength()"></textarea>
                    <div class="char-counter" id="charCounter">0 / 1000 حرف</div>
                </div>

                <div class="btn-container split-btns">
                    <button type="button" class="btn-prev" onclick="prevStep()">السابق</button>
                    <button type="button" class="btn-next" id="submitBtn" onclick="submitForm()">إرسال الاستمارة</button>
                </div>
            </div>

            <div class="form-step" id="successStep">
                <div class="success-message">
                    <div class="success-icon">✓</div>
                    <h2 style="font-size: 22px; margin-bottom: 10px; color: var(--dark-color);">شكرًا لك يا <span id="studentName">بطل</span>!</h2>
                    <p style="color: #6b7280; line-height: 1.7; font-size: 15px;">تم استلام بياناتك وبيانات ولي أمرك بنجاح. فريق "قضية طالب ثانوي" سيتواصل معكم في أقرب وقت لحسم قضيتك!</p>
                </div>
            </div>

        </form>
    </div>

    <script>
        let currentStep = 0;
        const formSteps = document.querySelectorAll('.form-step');
        const bgPattern = document.getElementById('bgPattern');

        // تأثير الماوس الجمالي على الخلفية
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.015;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.015;
            bgPattern.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        function updateDynamicNames() {
            const fullName = document.getElementById('fullName').value.trim();
            const firstName = fullName ? fullName.split(' ')[0] : "بطل";
            document.querySelectorAll('.dynamic-name').forEach(el => {
                el.innerText = firstName;
            });
        }

        // التعامل الذكي مع الشعبة والأسئلة الخاصة بتالتة ثانوي
        function handleGradeChange() {
            const grade = document.getElementById('grade').value;
            const sectionGroup = document.getElementById('stepSection');
            const sectionSelect = document.getElementById('section');
            const seniorThreeGroup = document.getElementById('seniorThreeQuestions');
            const lessonSystem = document.getElementById('lessonSystem');
            const onlineLessonsCount = document.getElementById('onlineLessonsCount');
            
            sectionSelect.innerHTML = "";

            if (grade === "3") {
                // تالتة ثانوي: تظهر الشعب والأسئلة الإضافية وتصبح مطلوبة
                sectionGroup.style.display = "block";
                sectionSelect.setAttribute('required', 'required');
                sectionSelect.innerHTML = `
                    <option value="">اختر الشعبة</option>
                    <option value="علمي علوم">علمي علوم</option>
                    <option value="علمي رياضة">علمي رياضة</option>
                    <option value="أدبي">أدبي</option>
                `;
                seniorThreeGroup.style.display = "block";
                lessonSystem.setAttribute('required', 'required');
                onlineLessonsCount.setAttribute('required', 'required');
            } 
            else if (grade === "2") {
                // تانية ثانوي: تظهر الشعب فقط وتختفي أسئلة تالتة ثانوي
                sectionGroup.style.display = "block";
                sectionSelect.setAttribute('required', 'required');
                sectionSelect.innerHTML = `
                    <option value="">اختر الشعبة</option>
                    <option value="علمي">علمي</option>
                    <option value="أدبي">أدبي</option>
                `;
                seniorThreeGroup.style.display = "none";
                lessonSystem.removeAttribute('required');
                onlineLessonsCount.removeAttribute('required');
                lessonSystem.value = "";
                onlineLessonsCount.value = "";
            } 
            else if (grade === "1") {
                // أولى ثانوي: تختفي الشعب والأسئلة الإضافية
                sectionGroup.style.display = "none";
                sectionSelect.removeAttribute('required');
                const opt = document.createElement('option');
                opt.value = "عام مشترك";
                opt.text = "عام مشترك (لأولى ثانوي)";
                sectionSelect.appendChild(opt);
                
                seniorThreeGroup.style.display = "none";
                lessonSystem.removeAttribute('required');
                onlineLessonsCount.removeAttribute('required');
                lessonSystem.value = "";
                onlineLessonsCount.value = "";
            } else {
                sectionGroup.style.display = "none";
                sectionSelect.removeAttribute('required');
                seniorThreeGroup.style.display = "none";
                lessonSystem.removeAttribute('required');
                onlineLessonsCount.removeAttribute('required');
                lessonSystem.value = "";
                onlineLessonsCount.value = "";
            }
        }

        function showStep(stepIndex) {
            formSteps.forEach((step, index) => {
                step.classList.toggle('active', index === stepIndex);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextStep() {
            const currentStepEl = formSteps[currentStep];
            const inputs = currentStepEl.querySelectorAll('input, select, textarea');
            
            let allValid = true;
            inputs.forEach(input => {
                if (!input.checkValidity()) {
                    input.reportValidity();
                    allValid = false;
                }
            });

            if (allValid && currentStep < formSteps.length - 1) {
                currentStep++;
                showStep(currentStep);
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                showStep(currentStep);
            }
        }

        function checkMessageLength() {
            const msgInput = document.getElementById('message');
            const counterEl = document.getElementById('charCounter');
            const submitBtn = document.getElementById('submitBtn');
            const currentLength = msgInput.value.length;

            if (currentLength === 0) {
                counterEl.innerText = `0 / 1000 حرف (يمكنك الإرسال مباشرة أو تخطي السؤال)`;
                counterEl.classList.remove('valid', 'invalid');
                submitBtn.disabled = false; 
                submitBtn.innerText = "إرسال الاستمارة";
            } else if (currentLength > 0 && currentLength <= 1000) {
                counterEl.innerText = `${currentLength} / 1000 حرف (مسموح بالإرسال)`;
                counterEl.classList.add('valid');
                counterEl.classList.remove('invalid');
                submitBtn.disabled = false; 
                submitBtn.innerText = "إرسال الاستمارة";
            } else if (currentLength > 1000) {
                counterEl.innerText = `${currentLength} / 1000 حرف (تخطيت الحد الأقصى بـ ${currentLength - 1000} حرف)`;
                counterEl.classList.remove('valid');
                counterEl.classList.add('invalid');
                submitBtn.disabled = true; 
            }
        }

        function escapeHTML(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt bridge;");
        }

        async function submitForm() {
            const messageInput = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            if (messageInput.value.length > 1000) return;

            const fullName = escapeHTML(document.getElementById('fullName').value);
            const phone = escapeHTML(document.getElementById('phone').value);
            const birthDate = escapeHTML(document.getElementById('birthDate').value);
            const email = escapeHTML(document.getElementById('email').value);
            const gradeVal = document.getElementById('grade').value;
            const eduType = escapeHTML(document.getElementById('educationType').value);
            const section = escapeHTML(document.getElementById('section').value);
            const city = escapeHTML(document.getElementById('city').value);
            
            // جلب قيم أسئلة تالتة ثانوي
            const lessonSystemVal = escapeHTML(document.getElementById('lessonSystem').value);
            const onlineLessonsCountVal = escapeHTML(document.getElementById('onlineLessonsCount').value);
            
            const parentName = escapeHTML(document.getElementById('parentName').value);
            const parentPhone = escapeHTML(document.getElementById('parentPhone').value);
            const parentWhatsapp = escapeHTML(document.getElementById('parentWhatsapp').value);
            
            const rawMessage = messageInput.value.trim();
            const message = rawMessage ? escapeHTML(rawMessage) : "<i>(لم يتم ذكر مشكلة - تخطى السؤال)</i>";

            let gradeText = "";
            if (gradeVal === "1") gradeText = "الصف الأول الثانوي";
            else if (gradeVal === "2") gradeText = "الصف الثاني الثانوي";
            else if (gradeVal === "3") gradeText = "الصف الثالث الثانوي";

            // صياغة تفاصيل أسئلة تالتة ثانوي داخل رسالة تليجرام ديناميكياً
            let seniorThreeTelegramDetails = "";
            if (gradeVal === "3") {
                seniorThreeTelegramDetails = `
<b>📚 [تفاصيل نظام الدراسة لـ 3ث]</b>
<b>⚙️ نظام الدروس:</b> ${lessonSystemVal}
<b>💻 عدد الدروس الأونلاين:</b> ${onlineLessonsCountVal}
--------------------------------------`;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "جاري الإرسال...";

            const botToken1 = "8773946609:AAFcj135q22j-92ICGnwJJKKrn3RXaIO30c";
            const chatId1 = "8244352245";

            const botToken2 = "8980731779:AAHVEKu9s5M55L6DYN6Q3edDUN71ANCxc5s";
            const chatId2 = "5511952564";

            const telegramMessage = `
<b>📥 استمارة صُعِدت لـ "قضية طالب ثانوي"</b>
--------------------------------------
<b>👨‍🎓 [بيانات الطالب]</b>
<b>👤 الاسم بالكامل:</b> ${fullName}
<b>📍 المحافظة:</b> ${city}
<b>📱 رقم الواتساب:</b> <a href="https://wa.me/2${phone}">${phone}</a>
<b>📅 تاريخ الميلاد:</b> ${birthDate}
<b>📧 البريد الإلكتروني:</b> ${email}
<b>🎓 السنة الدراسية:</b> ${gradeText}
<b>🏛️ نوع التعليم:</b> ثانوية ${eduType}
<b>🧬 الشعبة:</b> ${section}
--------------------------------------${seniorThreeTelegramDetails}

<b>👨‍👩‍👦 [بيانات ولي الأمر]</b>
<b>👤 اسم ولي الأمر:</b> ${parentName}
<b>📱 رقم تليفونه:</b> <a href="https://wa.me/2${parentPhone}">${parentPhone}</a>
<b>💬 حالة الواتساب:</b> ${parentWhatsapp}

<b>⚠️ أكبر مشكلة تواجه الطالب:</b>
${message}
            `.trim();

            try {
                const requestBot1 = fetch(`https://api.telegram.org/bot${botToken1}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId1,
                        text: telegramMessage,
                        parse_mode: 'HTML'
                    })
                });

                const requestBot2 = fetch(`https://api.telegram.org/bot${botToken2}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId2,
                        text: telegramMessage,
                        parse_mode: 'HTML'
                    })
                });

                const [res1, res2] = await Promise.all([requestBot1, requestBot2]);

                if (!res1.ok || !res2.ok) {
                    throw new Error('فشل إرسال البيانات لسيرفرات تليجرام');
                }

                document.getElementById('studentName').innerText = fullName.split(' ')[0];
                currentStep = formSteps.length - 1; 
                showStep(currentStep);

            } catch (error) {
                console.error("خطأ أثناء الإرسال:", error);
                alert("عذرًا، حدث خطأ أثناء إرسال البيانات. يرجى التحقق من اتصال الإنترنت والمحاولة مرة أخرى.");
                submitBtn.disabled = false;
                submitBtn.innerText = "إرسال الاستمارة";
            }
        }

        window.onload = function() {
            document.getElementById('studentForm').reset();
            document.getElementById('charCounter').innerText = `0 / 1000 حرف`;
            handleGradeChange();
        };
    </script>
</body>
