<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - قضية طالب ثانوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 25px 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-logo h2 {
            color: white;
            font-size: 20px;
        }

        .sidebar-logo h2 span {
            color: #f5c400;
        }

        .sidebar-logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 5px;
        }

        .stats-sidebar {
            margin-bottom: 25px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
        }

        .stat-item .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-item .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: white;
        }

        .stat-item .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .main-content {
            flex: 1;
        }

        .admin-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            font-size: 24px;
            color: #1f2937;
        }

        .admin-header h1 span {
            color: #f5c400;
        }

        .connection-status {
            background: #10b981;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 10px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        .controls-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .month-info {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
        }

        .btn-sync, .btn-export, .btn-reset {
            padding: 10px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-sync { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-reset { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-export { background: linear-gradient(135deg, #10b981, #059669); color: white; }

        .btn-sync:hover, .btn-reset:hover, .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box input {
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            width: 280px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow-x: auto;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #f3f4f6;
        }

        tr:hover {
            background: #f8fafc;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-new { background: #dbeafe; color: #1e40af; }
        .status-contacted { background: #fef3c7; color: #92400e; }
        .status-done { background: #d1fae5; color: #065f46; }
        .status-incomplete { background: #fee2e2; color: #991b1b; }

        .view-btn, .delete-btn {
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 3px;
            transition: all 0.3s;
        }
        .view-btn { background: #3b82f6; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        .view-btn:hover, .delete-btn:hover { transform: scale(1.05); }

        .archive-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .archive-section h3 {
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .archive-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 10px;
            transition: all 0.3s;
        }

        .archive-item:hover {
            background: #f8fafc;
            border-radius: 12px;
        }

        .archive-btns button {
            margin: 0 5px;
            padding: 6px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .archive-btns button:hover {
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 22px;
        }

        .modal-content p {
            margin: 10px 0;
            line-height: 1.7;
            border-bottom: 1px solid #f3f4f6;
            padding-bottom: 8px;
        }

        .close-modal {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            font-weight: 600;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            max-width: 420px;
            margin: 80px auto;
            padding: 45px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            color: #1f2937;
            margin-bottom: 10px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 20px 0;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .login-box button {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 1000px) {
            .admin-wrapper { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .stats-sidebar { display: flex; flex-wrap: wrap; gap: 12px; }
            .stat-item { flex: 1; min-width: 120px; }
        }

        @media (max-width: 768px) {
            .controls-bar { flex-direction: column; }
            .search-box input { width: 100%; }
            .archive-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <div class="sidebar" id="sidebarPanel" style="display: none;">
        <div class="sidebar-logo">
            <h2>قضية <span>طالب ثانوي</span></h2>
            <p>نظام إدارة الاستمارات</p>
        </div>
        <div class="stats-sidebar" id="sidebarStats"></div>
        <div style="margin-top: 20px; text-align: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2);">
            <p style="color: rgba(255,255,255,0.5); font-size: 11px;">© 2026 - جميع الحقوق محفوظة</p>
        </div>
    </div>

    <div class="main-content">
        <div id="loginScreen" class="login-box">
            <div style="font-size: 50px; margin-bottom: 15px;">👑</div>
            <h2>لوحة التحكم</h2>
            <p style="color: #6b7280; margin-bottom: 20px;">أدخل كلمة المرور للمتابعة</p>
            <input type="password" id="passwordInput" placeholder="••••••••">
            <button onclick="checkLogin()">دخول</button>
            <p style="margin-top: 20px; font-size: 12px; color: #9ca3af;">كلمة المرور: admin123</p>
        </div>

        <div id="adminPanel" style="display: none;">
            <div class="admin-header">
                <h1>👑 ADMIN PANEL - <span>قضية طالب ثانوي</span>
                    <span class="connection-status" id="connectionStatus">🤖 متصل بتليجرام</span>
                </h1>
                <button class="logout-btn" onclick="logout()">تسجيل الخروج <i class="fas fa-sign-out-alt"></i></button>
            </div>

            <div class="controls-bar">
                <div class="month-info" id="monthInfo">📅 الشهر الحالي</div>
                <div>
                    <button class="btn-sync" onclick="loadFromTelegram()"><i class="fas fa-sync-alt"></i> تحديث من تليجرام</button>
                    <button class="btn-export" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو الهاتف..." onkeyup="renderTable()">
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المرحلة</th><th>الاشتراك</th><th>التاريخ</th><th>الحالة</th><th>إجراءات</th></td>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل من تليجرام...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-file-alt"></i> تفاصيل الاستمارة</h3>
        <div id="modalContent"></div>
        <button class="close-modal" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    // ========== إعدادات تليجرام ==========
    const BOT_TOKEN = "8773946609:AAFcj135q22j-92ICGnwJJKKrn3RXaIO30c";
    // قراءة الرسائل من المحادثات الخاصة (حسابيك الشخصيين)
    const CHAT_IDS = ["8244352245", "5511952564"]; // حسابك القديم والجديد
    
    let submissionsData = []; // مصفوفة لتخزين الاستمارات
    
    // ========== تحميل البيانات من تليجرام (من المحادثات الخاصة) ==========
    async function loadFromTelegram() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل من تليجرام...</td></tr>';
        
        let allMessages = [];
        
        try {
            // جلب الرسائل من جميع المحادثات المحددة
            for (const chatId of CHAT_IDS) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?chat_id=${chatId}&limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        const message = update.message;
                        if (message && message.text && message.text.includes("📋 **استمارة تسجيل جديدة - قضية طالب ثانوي**")) {
                            allMessages.push({
                                text: message.text,
                                date: message.date,
                                chatId: chatId
                            });
                        }
                    }
                    console.log(`✅ تم تحميل ${data.result.length} رسالة من المحادثة ${chatId}`);
                } else {
                    console.warn(`⚠️ فشل جلب البيانات من المحادثة ${chatId}:`, data);
                }
            }
            
            if (allMessages.length > 0) {
                const submissions = [];
                
                for (const msg of allMessages) {
                    const parsed = parseTelegramMessage(msg.text, msg.date);
                    if (parsed) {
                        submissions.push(parsed);
                    }
                }
                
                // إزالة التكرارات بناءً على المعرف (id)
                const uniqueSubmissions = [];
                const ids = new Set();
                for (const sub of submissions) {
                    if (!ids.has(sub.id)) {
                        ids.add(sub.id);
                        uniqueSubmissions.push(sub);
                    }
                }
                
                // ترتيب من الأحدث إلى الأقدم
                uniqueSubmissions.sort((a, b) => b.timestamp - a.timestamp);
                submissionsData = uniqueSubmissions;
                
                renderStats();
                renderTable();
                console.log(`✅ تم تحميل ${uniqueSubmissions.length} استمارة من تليجرام (من ${CHAT_IDS.length} محادثة)`);
                document.getElementById('connectionStatus').innerHTML = '🤖 متصل بتليجرام ✅';
                document.getElementById('connectionStatus').style.background = '#10b981';
            } else {
                console.log("📭 لا توجد رسائل استمارة في المحادثات");
                submissionsData = [];
                renderStats();
                renderTable();
                document.getElementById('connectionStatus').innerHTML = '📭 لا توجد بيانات';
                document.getElementById('connectionStatus').style.background = '#f59e0b';
            }
        } catch (error) {
            console.error("خطأ في الاتصال بتليجرام:", error);
            tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">❌ خطأ في الاتصال بتليجرام. تأكد من اتصالك بالإنترنت.</td></tr>';
            document.getElementById('connectionStatus').innerHTML = '❌ غير متصل';
            document.getElementById('connectionStatus').style.background = '#ef4444';
        }
    }
    
    // ========== تحليل نص الرسالة واستخراج البيانات ==========
    function parseTelegramMessage(text, date) {
        try {
            const data = {};
            data.timestamp = date * 1000;
            data.date = new Date(data.timestamp).toLocaleString('ar-EG');
            data.id = data.timestamp;
            data.status = "جديد";
            
            // استخراج البيانات باستخدام تعابير منتظمة
            const nameMatch = text.match(/• \*\*الاسم:\*\* (.+)/);
            const cityMatch = text.match(/• \*\*المحافظة:\*\* (.+)/);
            const phoneMatch = text.match(/• \*\*الهاتف:\*\* (.+)/);
            const emailMatch = text.match(/• \*\*البريد الإلكتروني:\*\* (.+)/);
            const birthMatch = text.match(/• \*\*تاريخ الميلاد:\*\* (.+)/);
            const gradeMatch = text.match(/• \*\*المرحلة الدراسية:\*\* (.+)/);
            const educationMatch = text.match(/• \*\*نوع التعليم:\*\* (.+)/);
            const sectionMatch = text.match(/• \*\*الشعبة:\*\* (.+)/);
            const lessonSystemMatch = text.match(/• \*\*نظام الدروس:\*\* (.+)/);
            const parentNameMatch = text.match(/• \*\*اسم ولي الأمر:\*\* (.+)/);
            const parentPhoneMatch = text.match(/• \*\*هاتف ولي الأمر:\*\* (.+)/);
            const messageMatch = text.match(/• \*\*الرسالة:\*\* (.+)/);
            const planMatch = text.match(/• \*\*الخطة:\*\* (.+)/);
            
            data.fullName = nameMatch ? nameMatch[1].trim() : "غير معروف";
            data.city = cityMatch ? cityMatch[1].trim() : "";
            data.phone = phoneMatch ? phoneMatch[1].trim() : "";
            data.email = emailMatch ? emailMatch[1].trim() : "";
            data.birthDate = birthMatch ? birthMatch[1].trim() : "";
            data.grade = gradeMatch ? gradeMatch[1].trim() : "";
            data.educationType = educationMatch ? educationMatch[1].trim() : "";
            data.section = sectionMatch ? sectionMatch[1].trim() : "";
            data.lessonSystem = lessonSystemMatch ? lessonSystemMatch[1].trim() : "";
            data.parentName = parentNameMatch ? parentNameMatch[1].trim() : "";
            data.parentPhone = parentPhoneMatch ? parentPhoneMatch[1].trim() : "";
            data.message = messageMatch ? messageMatch[1].trim() : "";
            data.selectedPlan = planMatch ? planMatch[1].trim() : "";
            
            return data;
        } catch (e) {
            console.error("خطأ في تحليل الرسالة:", e);
            return null;
        }
    }
    
    // ========== عرض الإحصائيات في الشريط الجانبي ==========
    function renderStats() {
        const total = submissionsData.length;
        const today = new Date().toDateString();
        const todayCount = submissionsData.filter(s => new Date(s.timestamp).toDateString() === today).length;
        
        let totalRevenue = 0;
        submissionsData.forEach(s => {
            if (s.selectedPlan.includes('100')) totalRevenue += 100;
            else if (s.selectedPlan.includes('200')) totalRevenue += 200;
            else if (s.selectedPlan.includes('500')) totalRevenue += 500;
        });
        
        // إحصائيات الشهر الحالي
        const now = new Date();
        const currentMonth = `${now.getFullYear()}/${now.getMonth()+1}`;
        const monthSubmissions = submissionsData.filter(s => {
            const d = new Date(s.timestamp);
            return `${d.getFullYear()}/${d.getMonth()+1}` === currentMonth;
        });
        
        let monthRevenue = 0;
        monthSubmissions.forEach(s => {
            if (s.selectedPlan.includes('100')) monthRevenue += 100;
            else if (s.selectedPlan.includes('200')) monthRevenue += 200;
            else if (s.selectedPlan.includes('500')) monthRevenue += 500;
        });
        
        document.getElementById('sidebarStats').innerHTML = `
            <div class="stat-item"><div class="stat-icon">📊</div><div class="stat-number">${total}</div><div class="stat-label">إجمالي الاستمارات</div></div>
            <div class="stat-item"><div class="stat-icon">🆕</div><div class="stat-number">${todayCount}</div><div class="stat-label">اليوم</div></div>
            <div class="stat-item"><div class="stat-icon">📅</div><div class="stat-number">${monthSubmissions.length}</div><div class="stat-label">هذا الشهر</div></div>
            <div class="stat-item"><div class="stat-icon">💰</div><div class="stat-number">${totalRevenue.toLocaleString()}</div><div class="stat-label">إجمالي الإيرادات</div></div>
            <div class="stat-item"><div class="stat-icon">💵</div><div class="stat-number">${monthRevenue.toLocaleString()}</div><div class="stat-label">إيرادات الشهر</div></div>
        `;
        
        document.getElementById('monthInfo').innerHTML = `📅 الشهر الحالي: ${currentMonth} (${monthSubmissions.length} استمارة)`;
    }
    
    // ========== عرض الجدول ==========
    function renderTable() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = submissionsData.filter(s => 
            s.fullName.toLowerCase().includes(searchTerm) || 
            s.phone.includes(searchTerm)
        );
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">📭 لا توجد استمارات حتى الآن</td></tr>';
            return;
        }
        
        filtered.forEach((sub, idx) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = idx + 1;
            row.insertCell(1).innerText = sub.fullName;
            row.insertCell(2).innerText = sub.phone;
            row.insertCell(3).innerText = sub.grade;
            row.insertCell(4).innerText = sub.selectedPlan;
            row.insertCell(5).innerText = sub.date;
            
            let statusClass = 'status-new';
            if (sub.status === 'تم التواصل') statusClass = 'status-contacted';
            if (sub.status === 'منتهي') statusClass = 'status-done';
            if (sub.status === 'لم يكتمل') statusClass = 'status-incomplete';
            row.insertCell(6).innerHTML = `<span class="status-badge ${statusClass}">${sub.status || 'جديد'}</span>`;
            
            row.insertCell(7).innerHTML = `
                <button class="view-btn" onclick="showDetails(${sub.id})"><i class="fas fa-eye"></i></button>
                <button class="delete-btn" onclick="deleteSubmission(${sub.id})"><i class="fas fa-trash"></i></button>
            `;
        });
    }
    
    // ========== عرض التفاصيل ==========
    function showDetails(id) {
        const sub = submissionsData.find(s => s.id === id);
        if (sub) {
            document.getElementById('modalContent').innerHTML = `
                <p><strong>👤 الاسم:</strong> ${sub.fullName}</p>
                <p><strong>📍 المحافظة:</strong> ${sub.city}</p>
                <p><strong>📞 الهاتف:</strong> ${sub.phone}</p>
                <p><strong>📧 البريد:</strong> ${sub.email}</p>
                <p><strong>🎂 تاريخ الميلاد:</strong> ${sub.birthDate}</p>
                <p><strong>📚 المرحلة:</strong> ${sub.grade}</p>
                <p><strong>🎓 الشعبة:</strong> ${sub.section}</p>
                <p><strong>👨‍👦 ولي الأمر:</strong> ${sub.parentName}</p>
                <p><strong>📱 هاتف ولي الأمر:</strong> ${sub.parentPhone}</p>
                <p><strong>💬 المشكلة:</strong> ${sub.message}</p>
                <p><strong>💰 الاشتراك:</strong> ${sub.selectedPlan}</p>
                <p><strong>🕐 التاريخ:</strong> ${sub.date}</p>
                <p><strong>📌 الحالة:</strong> 
                    <select id="statusSelect" onchange="updateStatus(${sub.id}, this.value)">
                        <option value="جديد" ${sub.status === 'جديد' ? 'selected' : ''}>جديد</option>
                        <option value="تم التواصل" ${sub.status === 'تم التواصل' ? 'selected' : ''}>تم التواصل</option>
                        <option value="منتهي" ${sub.status === 'منتهي' ? 'selected' : ''}>منتهي</option>
                        <option value="لم يكتمل" ${sub.status === 'لم يكتمل' ? 'selected' : ''}>لم يكتمل</option>
                    </select>
                </p>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }
    }
    
    // ========== تحديث الحالة ==========
    function updateStatus(id, newStatus) {
        const index = submissionsData.findIndex(s => s.id === id);
        if (index !== -1) {
            submissionsData[index].status = newStatus;
            renderStats();
            renderTable();
            alert("✅ تم تحديث الحالة");
        }
    }
    
    // ========== حذف استمارة ==========
    function deleteSubmission(id) {
        if (confirm("⚠️ هل أنت متأكد من حذف هذه الاستمارة؟")) {
            submissionsData = submissionsData.filter(s => s.id !== id);
            renderStats();
            renderTable();
            alert("✅ تم حذف الاستمارة");
        }
    }
    
    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
    }
    
    // ========== تصدير إلى Excel ==========
    function exportToExcel() {
        let csv = "الاسم,الهاتف,المرحلة,الاشتراك,التاريخ,الحالة\n";
        submissionsData.forEach(s => {
            csv += `"${s.fullName}",${s.phone},${s.grade},${s.selectedPlan},${s.date},${s.status || 'جديد'}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `استمارات_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }
    
    // ========== وظائف تسجيل الدخول ==========
    function checkLogin() {
        const pass = document.getElementById('passwordInput').value;
        if (pass === 'admin123') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('sidebarPanel').style.display = 'block';
            loadFromTelegram();
            // تحديث تلقائي كل 30 ثانية
            setInterval(() => {
                if (document.getElementById('adminPanel').style.display === 'block') {
                    loadFromTelegram();
                }
            }, 30000);
        } else {
            alert('كلمة المرور غير صحيحة');
        }
    }
    
    function logout() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('sidebarPanel').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        submissionsData = [];
    }
</script>
</body>
</html>
