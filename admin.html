<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - قضية طالب ثانوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 25px 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-logo h2 {
            color: white;
            font-size: 20px;
        }

        .sidebar-logo h2 span {
            color: #f5c400;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
        }

        .stat-item .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-item .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: white;
        }

        .stat-item .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .main-content {
            flex: 1;
        }

        .admin-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            font-size: 24px;
            color: #1f2937;
        }

        .admin-header h1 span {
            color: #f5c400;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .controls-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .month-info {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
        }

        .btn-sync, .btn-export, .btn-reset {
            padding: 10px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-sync { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-reset { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-export { background: linear-gradient(135deg, #10b981, #059669); color: white; }

        .search-box input {
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            width: 280px;
            font-size: 14px;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow-x: auto;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
            padding: 15px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #f3f4f6;
        }

        tr:hover {
            background: #f8fafc;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-new { background: #dbeafe; color: #1e40af; }
        .status-contacted { background: #fef3c7; color: #92400e; }
        .status-done { background: #d1fae5; color: #065f46; }
        .status-incomplete { background: #fee2e2; color: #991b1b; }

        .view-btn, .delete-btn {
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 3px;
        }
        .view-btn { background: #3b82f6; color: white; }
        .delete-btn { background: #ef4444; color: white; }

        .archive-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .archive-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 10px;
        }

        .archive-btns button {
            margin: 0 5px;
            padding: 6px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-modal {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            max-width: 420px;
            margin: 80px auto;
            padding: 45px;
            border-radius: 32px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 20px 0;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
        }

        .login-box button {
            background: linear-gradient(135deg, #1f2937, #374151);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        @media (max-width: 1000px) {
            .admin-wrapper { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .stats-sidebar { display: flex; flex-wrap: wrap; gap: 12px; }
            .stat-item { flex: 1; min-width: 120px; }
        }
        @media (max-width: 768px) {
            .controls-bar { flex-direction: column; }
            .search-box input { width: 100%; }
            .archive-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <div class="sidebar" id="sidebarPanel" style="display: none;">
        <div class="sidebar-logo">
            <h2>قضية <span>طالب ثانوي</span></h2>
            <p>نظام إدارة الاستمارات</p>
        </div>
        <div class="stats-sidebar" id="sidebarStats"></div>
        <div style="margin-top: 20px; text-align: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2);">
            <p style="color: rgba(255,255,255,0.5); font-size: 11px;">© 2026 - جميع الحقوق محفوظة</p>
        </div>
    </div>

    <div class="main-content">
        <div id="loginScreen" class="login-box">
            <div style="font-size: 50px; margin-bottom: 15px;">👑</div>
            <h2>لوحة التحكم</h2>
            <p style="color: #6b7280; margin-bottom: 20px;">أدخل كلمة المرور للمتابعة</p>
            <input type="password" id="passwordInput" placeholder="••••••••">
            <button onclick="checkLogin()">دخول</button>
            <p style="margin-top: 20px; font-size: 12px; color: #9ca3af;">كلمة المرور: admin123</p>
        </div>

        <div id="adminPanel" style="display: none;">
            <div class="admin-header">
                <h1>👑 ADMIN PANEL - <span>قضية طالب ثانوي</span></h1>
                <button class="logout-btn" onclick="logout()">تسجيل الخروج <i class="fas fa-sign-out-alt"></i></button>
            </div>

            <div class="controls-bar">
                <div class="month-info" id="monthInfo">📅 الشهر الحالي</div>
                <div>
                    <button class="btn-sync" onclick="loadData()"><i class="fas fa-sync-alt"></i> مزامنة</button>
                    <button class="btn-reset" onclick="resetMonthly()"><i class="fas fa-trash-alt"></i> تصفير شهري</button>
                    <button class="btn-export" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو الهاتف..." onkeyup="renderTable()">
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المرحلة</th><th>الاشتراك</th><th>التاريخ</th><th>الحالة</th><th>إجراءات</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="archive-section">
                <h3><i class="fas fa-archive"></i> 📦 أرشيف الشهور السابقة</h3>
                <div id="archiveList"></div>
            </div>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-file-alt"></i> تفاصيل الاستمارة</h3>
        <div id="modalContent"></div>
        <button class="close-modal" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    // ========== إعدادات GitHub API ==========
    const GITHUB_USERNAME = "katittalebsanwe";
    const GITHUB_REPO = "katittalebsanwe";
    const GITHUB_TOKEN = "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";
    const DATA_FILE = "data.json";
    
    let allData = [];
    let currentData = [];
    let currentMonth = "";

    // ========== تحميل البيانات من GitHub ==========
    async function loadDataFromGitHub() {
        try {
            const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${DATA_FILE}`;
            const response = await fetch(url, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            
            if(response.ok) {
                const fileData = await response.json();
                const content = atob(fileData.content);
                allData = JSON.parse(content);
                console.log(`✅ تم تحميل ${allData.length} استمارة من GitHub`);
            } else if(response.status === 404) {
                console.log("ملف data.json غير موجود، سيتم إنشاؤه عند أول إرسال");
                allData = [];
            } else {
                console.error("خطأ في تحميل البيانات:", response.status);
                allData = [];
            }
        } catch(error) {
            console.error("خطأ في الاتصال بـ GitHub:", error);
            allData = [];
        }
        return allData;
    }

    // ========== حفظ البيانات إلى GitHub ==========
    async function saveToGitHub() {
        try {
            const getUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${DATA_FILE}`;
            let sha = null;
            
            try {
                const getResponse = await fetch(getUrl, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if(getResponse.ok) {
                    const fileData = await getResponse.json();
                    sha = fileData.sha;
                }
            } catch(e) {}
            
            const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));
            const putUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${DATA_FILE}`;
            const putBody = {
                message: `تحديث البيانات - ${new Date().toLocaleString()}`,
                content: newContent,
                branch: "main"
            };
            if(sha) putBody.sha = sha;
            
            const putResponse = await fetch(putUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(putBody)
            });
            
            return putResponse.ok;
        } catch(error) {
            console.error("خطأ في حفظ البيانات:", error);
            return false;
        }
    }

    // ========== تحميل وتنظيم البيانات ==========
    async function loadData() {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>';
        await loadDataFromGitHub();
        organizeData();
        renderSidebarStats();
        renderTable();
        renderArchive();
    }

    function organizeData() {
        const now = new Date();
        currentMonth = `${now.getFullYear()}/${now.getMonth()+1}`;
        currentData = allData.filter(s => {
            const date = new Date(s.timestamp);
            return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
        });
        document.getElementById('monthInfo').innerHTML = `📅 الشهر الحالي: ${currentMonth} (${currentData.length} استمارة)`;
    }

    function renderSidebarStats() {
        const now = new Date();
        const todaySubmissions = allData.filter(s => {
            const d = new Date(s.timestamp);
            return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        });
        
        let totalRevenue = 0;
        allData.forEach(s => {
            if(s.selectedPlan.includes('100')) totalRevenue += 100;
            else if(s.selectedPlan.includes('200')) totalRevenue += 200;
            else if(s.selectedPlan.includes('500')) totalRevenue += 500;
        });
        
        let monthRevenue = 0;
        currentData.forEach(s => {
            if(s.selectedPlan.includes('100')) monthRevenue += 100;
            else if(s.selectedPlan.includes('200')) monthRevenue += 200;
            else if(s.selectedPlan.includes('500')) monthRevenue += 500;
        });
        
        document.getElementById('sidebarStats').innerHTML = `
            <div class="stat-item"><div class="stat-icon">📊</div><div class="stat-number">${allData.length}</div><div class="stat-label">إجمالي الاستمارات</div></div>
            <div class="stat-item"><div class="stat-icon">🆕</div><div class="stat-number">${todaySubmissions.length}</div><div class="stat-label">اليوم</div></div>
            <div class="stat-item"><div class="stat-icon">📅</div><div class="stat-number">${currentData.length}</div><div class="stat-label">هذا الشهر</div></div>
            <div class="stat-item"><div class="stat-icon">💰</div><div class="stat-number">${totalRevenue.toLocaleString()}</div><div class="stat-label">إجمالي الإيرادات</div></div>
            <div class="stat-item"><div class="stat-icon">💵</div><div class="stat-number">${monthRevenue.toLocaleString()}</div><div class="stat-label">إيرادات الشهر</div></div>
        `;
    }

    function renderTable() {
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let filtered = currentData.filter(s => 
            s.fullName.toLowerCase().includes(search) || 
            s.phone.includes(search)
        );
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        filtered.forEach((sub, idx) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = idx+1;
            row.insertCell(1).innerText = sub.fullName;
            row.insertCell(2).innerText = sub.phone;
            row.insertCell(3).innerText = sub.grade;
            row.insertCell(4).innerText = sub.selectedPlan;
            row.insertCell(5).innerText = sub.date;
            let statusClass = 'status-new';
            if(sub.status === 'تم التواصل') statusClass = 'status-contacted';
            if(sub.status === 'منتهي') statusClass = 'status-done';
            if(sub.status === 'لم يكتمل') statusClass = 'status-incomplete';
            row.insertCell(6).innerHTML = `<span class="status-badge ${statusClass}">${sub.status || 'جديد'}</span>`;
            row.insertCell(7).innerHTML = `
                <button class="view-btn" onclick="showDetails(${sub.id})"><i class="fas fa-eye"></i></button>
                <button class="delete-btn" onclick="deleteSingle(${sub.id})"><i class="fas fa-trash"></i></button>
            `;
        });
        if(filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">📭 لا توجد بيانات</td></tr>';
        }
    }

    function showDetails(id) {
        const sub = allData.find(s => s.id === id);
        if(sub) {
            document.getElementById('modalContent').innerHTML = `
                <p><strong>👤 الاسم:</strong> ${sub.fullName}</p>
                <p><strong>📍 المحافظة:</strong> ${sub.city}</p>
                <p><strong>📞 الهاتف:</strong> ${sub.phone}</p>
                <p><strong>📧 البريد:</strong> ${sub.email}</p>
                <p><strong>🎂 تاريخ الميلاد:</strong> ${sub.birthDay}/${sub.birthMonth}/${sub.birthYear}</p>
                <p><strong>📚 المرحلة:</strong> ${sub.grade}</p>
                <p><strong>🎓 الشعبة:</strong> ${sub.section}</p>
                <p><strong>👨‍👦 ولي الأمر:</strong> ${sub.parentName}</p>
                <p><strong>📱 هاتف ولي الأمر:</strong> ${sub.parentPhone}</p>
                <p><strong>💬 المشكلة:</strong> ${sub.message}</p>
                <p><strong>💰 الاشتراك:</strong> ${sub.selectedPlan}</p>
                <p><strong>📦 المنصات:</strong> ${sub.platforms}</p>
                <p><strong>🕐 التاريخ:</strong> ${sub.date}</p>
                <p><strong>📌 الحالة:</strong> 
                    <select id="statusSelect" onchange="updateStatus(${sub.id}, this.value)">
                        <option value="جديد" ${sub.status === 'جديد' ? 'selected' : ''}>جديد</option>
                        <option value="تم التواصل" ${sub.status === 'تم التواصل' ? 'selected' : ''}>تم التواصل</option>
                        <option value="منتهي" ${sub.status === 'منتهي' ? 'selected' : ''}>منتهي</option>
                        <option value="لم يكتمل" ${sub.status === 'لم يكتمل' ? 'selected' : ''}>لم يكتمل</option>
                    </select>
                </p>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }
    }

    async function updateStatus(id, newStatus) {
        const index = allData.findIndex(s => s.id === id);
        if(index !== -1) {
            allData[index].status = newStatus;
            const saved = await saveToGitHub();
            if(saved) {
                await loadData();
                alert("✅ تم تحديث الحالة بنجاح");
            } else {
                alert("❌ فشل تحديث الحالة");
            }
        }
    }

    async function deleteSingle(id) {
        if(confirm("⚠️ هل أنت متأكد من حذف هذه الاستمارة؟")) {
            allData = allData.filter(s => s.id !== id);
            const saved = await saveToGitHub();
            if(saved) {
                await loadData();
                alert("✅ تم حذف الاستمارة بنجاح");
            } else {
                alert("❌ فشل حذف الاستمارة");
            }
        }
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
    }

    function renderArchive() {
        const months = {};
        allData.forEach(s => {
            const date = new Date(s.timestamp);
            const key = `${date.getFullYear()}/${date.getMonth()+1}`;
            if(!months[key]) months[key] = [];
            months[key].push(s);
        });
        
        const sortedMonths = Object.keys(months).sort().reverse();
        const archiveDiv = document.getElementById('archiveList');
        archiveDiv.innerHTML = '';
        
        sortedMonths.forEach(month => {
            if(month !== currentMonth) {
                let revenue = 0;
                months[month].forEach(s => {
                    if(s.selectedPlan.includes('100')) revenue += 100;
                    else if(s.selectedPlan.includes('200')) revenue += 200;
                    else if(s.selectedPlan.includes('500')) revenue += 500;
                });
                archiveDiv.innerHTML += `
                    <div class="archive-item">
                        <div><i class="fas fa-folder"></i> 📁 ${month} - ${months[month].length} استمارة - ${revenue.toLocaleString()} جنيه</div>
                        <div class="archive-btns">
                            <button onclick="viewArchive('${month}')"><i class="fas fa-eye"></i> عرض</button>
                            <button onclick="exportArchive('${month}')"><i class="fas fa-download"></i> تصدير</button>
                        </div>
                    </div>
                `;
            }
        });
        if(sortedMonths.length === 0 || (sortedMonths.length === 1 && sortedMonths[0] === currentMonth)) {
            archiveDiv.innerHTML = '<p style="text-align:center;color:#6b7280;">📭 لا توجد أرشفة حتى الآن</p>';
        }
    }

    function viewArchive(month) {
        currentMonth = month;
        currentData = allData.filter(s => {
            const date = new Date(s.timestamp);
            return `${date.getFullYear()}/${date.getMonth()+1}` === month;
        });
        renderTable();
        document.getElementById('monthInfo').innerHTML = `📅 عرض أرشيف: ${month} (${currentData.length} استمارة) <button onclick="loadData()" style="margin-right:10px;background:#1f2937;color:white;border:none;padding:5px 12px;border-radius:8px;"><i class="fas fa-arrow-left"></i> العودة</button>`;
    }

    function exportToExcel() {
        let csv = "الاسم,الهاتف,المرحلة,الاشتراك,التاريخ,الحالة\n";
        currentData.forEach(s => {
            csv += `"${s.fullName}",${s.phone},${s.grade},${s.selectedPlan},${s.date},${s.status || 'جديد'}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `استمارات_${currentMonth}.csv`;
        link.click();
    }

    function exportArchive(month) {
        const data = allData.filter(s => {
            const date = new Date(s.timestamp);
            return `${date.getFullYear()}/${date.getMonth()+1}` === month;
        });
        let csv = "الاسم,الهاتف,المرحلة,الاشتراك,التاريخ,الحالة\n";
        data.forEach(s => {
            csv += `"${s.fullName}",${s.phone},${s.grade},${s.selectedPlan},${s.date},${s.status || 'جديد'}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `أرشيف_${month}.csv`;
        link.click();
    }

    async function resetMonthly() {
        if(confirm("⚠️ تحذير: سيتم نقل بيانات هذا الشهر إلى الأرشيف. هل أنت متأكد؟")) {
            const now = new Date();
            allData = allData.filter(s => {
                const d = new Date(s.timestamp);
                return !(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear());
            });
            const saved = await saveToGitHub();
            if(saved) {
                await loadData();
                alert("✅ تم تصفير الشهر بنجاح");
            } else {
                alert("❌ فشل تصفير الشهر");
            }
        }
    }

    function checkLogin() {
        const pass = document.getElementById('passwordInput').value;
        if(pass === 'admin123') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('sidebarPanel').style.display = 'block';
            loadData();
        } else {
            alert('كلمة المرور غير صحيحة');
        }
    }

    function logout() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('sidebarPanel').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        allData = [];
        currentData = [];
    }
</script>
</body>
</html>
